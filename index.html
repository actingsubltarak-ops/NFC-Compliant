<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFC Complaint</title>
    <script>
      // Suppress benign WebSocket and environment-specific errors
      const suppressErrors = (msg) => {
        const triggers = ['websocket', 'WebSocket', 'failed to connect', 'HMR', 'assertion failed'];
        return triggers.some(trigger => msg && msg.toString().includes(trigger));
      };

      window.addEventListener('error', (event) => {
        if (suppressErrors(event.message) || suppressErrors(event.error?.message)) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);

      window.addEventListener('unhandledrejection', (event) => {
        if (suppressErrors(event.reason) || suppressErrors(event.reason?.message)) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      });

      // Console suppression
      const originalError = console.error;
      const originalWarn = console.warn;
      console.error = (...args) => {
        if (args.some(arg => suppressErrors(arg))) return;
        originalError.apply(console, args);
      };
      console.warn = (...args) => {
        if (args.some(arg => suppressErrors(arg))) return;
        originalWarn.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
